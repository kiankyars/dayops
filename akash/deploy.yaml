version: "2.0"

services:
  dayops-api:
    image: ghcr.io/kiankyars/dayops:latest
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
    env:
      - PORT=8000
      - DAYOPS_STORAGE_ROOT=/data/dayops
      - DAYOPS_SESSION_SECRET=replace-me
      - GOOGLE_OAUTH_CLIENT_ID=replace-me
      - GOOGLE_OAUTH_CLIENT_SECRET=replace-me
      - GOOGLE_OAUTH_REDIRECT_URI=https://replace-me/auth/google/callback
      - DEFAULT_USER_TIMEZONE=America/Los_Angeles
      - MODEL_NAME=gemini-3-flash-preview
      - GEMINI_STT_MODEL=gemini-3-flash-preview
      - GEMINI_API_KEY=replace-me

profiles:
  compute:
    dayops-api:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    akash:
      pricing:
        dayops-api:
          denom: uakt
          amount: 100

deployment:
  dayops-api:
    akash:
      profile: dayops-api
      count: 1
